# .github/workflows/streak.yml
name: streak

on:
  schedule:
    - cron: "0 5 * * *"     # Daily at 05:00 UTC (runs the 3-9 commits loop)
    - cron: "0 */10 * * *"  # Every 10 hours at 00:00, 10:00, 20:00 UTC (runs 1 commit)
  workflow_dispatch:        # (optional) manual run button
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Commit & Push directly to main
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          set -x
          git config user.name "MansoobeZahra"
          git config user.email "mansoobezehra@gmail.com"
          
          # Determine number of commits to make
          if [ "${{ github.event.schedule }}" = "0 5 * * *" ]; then
            # Random number between 3 and 9
            NUM_COMMITS=$((3 + RANDOM % 7))
            echo "Daily schedule triggered: making $NUM_COMMITS commits."
          else
            NUM_COMMITS=1
            echo "Regular schedule or manual trigger: making 1 commit."
          fi
          
          # We make commits directly on the main branch
          # Pull latest changes to avoid conflicts
          git pull origin main
          
          for ((i=1; i<=NUM_COMMITS; i++)); do
            sleep 1
            echo "$(date -u)" >> daily.txt
            git add daily.txt
            git commit -m "auto streak $(date -u) ($i/$NUM_COMMITS)"
          done
          
          # Push directly to main branch
          git push origin main