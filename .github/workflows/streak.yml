# .github/workflows/streak.yml
name: streak

on:
  schedule:
    - cron: "0 0 * * *"   # every day at 00:00 UTC
  workflow_dispatch:       # (optional) manual run button

permissions:
  contents: write

jobs:
  auto:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update daily file
        run: echo "$(date -u)" >> daily.txt

      - name: Commit & push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "MansoobeZahra"
          git config user.email "149682728+MansoobeZahra@users.noreply.github.com"
          git add daily.txt
          git commit -m "auto streak $(date -u)" || exit 0
          git push https://x-access-token:${GH_TOKEN}@github.com/MansoobeZahra/B-Komachi.git HEAD:main