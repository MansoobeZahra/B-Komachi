# .github/workflows/streak.yml
name: streak

on:
  schedule:
    - cron: "0 5 * * *"     # Daily at 05:00 UTC (runs the 3-9 commits loop)
    - cron: "0 */10 * * *"  # Every 10 hours at 00:00, 10:00, 20:00 UTC (runs 1 commit)
  workflow_dispatch:        # (optional) manual run button
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Commit, PR & Merge
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          set -e
          set -x
          git config user.name "MansoobeZahra"
          git config user.email "mansoobezehra@gmail.com"
          
          # Determine number of commits to make
          if [ "${{ github.event.schedule }}" = "0 5 * * *" ]; then
            # Random number between 3 and 9
            NUM_COMMITS=$((3 + RANDOM % 7))
            echo "Daily schedule triggered: making $NUM_COMMITS commits."
          else
            NUM_COMMITS=1
            echo "Regular schedule or manual trigger: making 1 commit."
          fi
          
          # Create a unique branch name
          BRANCH_NAME="streak-update-$(date +%Y%m%d%H%M%S)-$RANDOM"
          git checkout -b "$BRANCH_NAME"
          
          for ((i=1; i<=NUM_COMMITS; i++)); do
            sleep 1
            echo "$(date -u)" >> daily.txt
            git add daily.txt
            git commit -m "auto streak $(date -u) ($i/$NUM_COMMITS)"
          done
          
          # Push the branch to origin using PAT
          git push https://x-access-token:${GH_TOKEN}@github.com/MansoobeZahra/B-Komachi.git "$BRANCH_NAME"
          
          # Create Pull Request using PAT with explicit repo
          PR_URL=$(gh pr create \
            --repo MansoobeZahra/B-Komachi \
            --title "Auto Streak Update $(date +%Y-%m-%d)" \
            --body "Automated contribution streak update." \
            --head "$BRANCH_NAME" \
            --base main)
          
          echo "Created Pull Request: $PR_URL"
          
          # Merge the Pull Request and delete the temporary branch
          gh pr merge "$PR_URL" --merge --delete-branch --repo MansoobeZahra/B-Komachi